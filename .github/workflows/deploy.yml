name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"

            echo "部署目录: $DEPLOY_DIR"

            # 如果目录不存在，首次克隆
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "首次部署，克隆仓库..."
              mkdir -p "$(dirname "$DEPLOY_DIR")"
              rm -rf "$DEPLOY_DIR"
              git clone https://github.com/hui0882/qq-bot.git "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"

            # 拉取最新代码
            echo "拉取最新代码..."
            git fetch origin main
            git reset --hard origin/main

            # 安装依赖
            echo "安装依赖..."
            npm ci

            # 写入配置文件
            echo "写入配置..."
            mkdir -p data
            cat > data/config.json << 'CONFIGEOF'
            ${{ secrets.CONFIG_JSON }}
            CONFIGEOF

            # 构建
            echo "构建项目..."
            npm run build

            # 启动/重启服务
            if command -v pm2 &> /dev/null && pm2 list 2>/dev/null | grep -q "napcat-platform"; then
              echo "重启服务..."
              pm2 restart napcat-platform
            else
              echo "首次启动服务..."
              pm2 start npm --name napcat-platform -- start
              pm2 save
            fi

            echo "部署完成 ✅"
