name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            # 加载用户环境变量（解决 pm2 等命令找不到的问题）
            source ~/.bashrc 2>/dev/null || source ~/.profile 2>/dev/null || true
            export PATH="$HOME/.npm-global/bin:$HOME/.local/bin:/usr/local/bin:$PATH"

            # 展开 ~ 为实际 home 目录
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_DIR="${DEPLOY_DIR/#\~/$HOME}"

            echo "部署目录: $DEPLOY_DIR"

            # 如果目录不存在或不是 git 仓库，首次克隆
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "首次部署，克隆仓库..."
              mkdir -p "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
              git init
              git remote add origin https://github.com/hui0882/qq-bot.git
              git fetch origin main
              git checkout -b main origin/main
            else
              cd "$DEPLOY_DIR"
              echo "拉取最新代码..."
              git fetch origin main
              git reset --hard origin/main
            fi

            # 安装依赖
            echo "安装依赖..."
            npm ci

            # 写入配置文件
            echo "写入配置..."
            mkdir -p data
            cat > data/config.json << 'CONFIGEOF'
            ${{ secrets.CONFIG_JSON }}
            CONFIGEOF

            # 构建
            echo "构建项目..."
            npm run build

            # 启动/重启服务
            if command -v pm2 &> /dev/null && pm2 list 2>/dev/null | grep -q "napcat-platform"; then
              echo "重启服务..."
              pm2 restart napcat-platform
            else
              echo "首次启动服务..."
              pm2 start npm --name napcat-platform -- start
              pm2 save
            fi

            echo "部署完成 ✅"
