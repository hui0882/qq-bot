name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            # 加载环境变量
            source ~/.bashrc 2>/dev/null || source ~/.profile 2>/dev/null || true
            export PATH="$HOME/.npm-global/bin:$HOME/.local/bin:/usr/local/bin:$PATH"

            # 进入部署目录
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_DIR="${DEPLOY_DIR/#\~/$HOME}"
            cd "$DEPLOY_DIR" || exit 1

            echo "拉取最新代码..."
            git pull origin main || { echo "❌ 拉取代码失败"; exit 1; }

            echo "安装依赖..."
            npm install --production=false || { echo "❌ 安装依赖失败"; exit 1; }

            echo "构建项目..."
            npm run build || { echo "❌ 构建失败"; exit 1; }

            # 启动/重启服务
            if command -v pm2 &> /dev/null && pm2 list 2>/dev/null | grep -q "napcat-platform"; then
              echo "重启服务..."
              pm2 restart napcat-platform || { echo "❌ 重启服务失败"; exit 1; }
            else
              echo "首次启动服务..."
              pm2 start npm --name napcat-platform -- start || { echo "❌ 启动服务失败"; exit 1; }
              pm2 save
            fi

            echo "部署完成 ✅"
