name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create dummy config
        run: |
          mkdir -p data
          echo '{"ws":{"url":"ws://localhost:3001","token":"","reconnect":true,"reconnectInterval":5000,"maxReconnectInterval":30000},"api":{"url":"http://localhost:3000","token":""},"tts":{"enabled":false,"apiUrl":"","apiKey":"","model":"mimo-v2.5-tts","voice":"茉莉","style":"温柔","format":"wav"},"voiceReply":{"mode":"off","allowUserOverride":false},"friendRequest":{"mode":"auto"},"auth":{"token":"test-token"},"log":{"maxEntries":5000,"persistToFile":true,"logDir":"data/logs"}}' > data/config.json

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next/
          retention-days: 7
